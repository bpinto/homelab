# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Enable packages
homeassistant:
  packages: !include_dir_named packages/

# Expose Home Assistant to the tailscale network
http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 127.0.0.1

logger:
  default: warning
  logs:
    # This integration doesn't automatically respect the configured home assistant
    # log level, so we set it to warning to avoid excessive logging.
    custom_components.portuguese_energy_price_tracker: warning
  filters:
    # Filter out 'message too large' warnings from Predbat entities
    homeassistant.components.recorder.db_schema:
      - "State attributes for predbat.* exceed maximum size of 16384 bytes. This can cause database performance issues; Attributes will not be stored"

# Increase history retention to 14 days for predbat to have enough data for accurate predictions
recorder:
  purge_keep_days: 14

# Enable the dbus_userns_patch to allow Home Assistant to run in a user namespace,
# which is required for running Home Assistant in a non-privileged container.
dbus_userns_patch:

# Disable DHCP discovery to avoid "Operation not permitted" errors
# in rootless Podman (raw socket access is restricted)
dhcp:
