template:
  - number:
      # Charge rate in watts
      - name: "Custom Goodwe Eco Mode Power Watts"
        unique_id: custom_goodwe_eco_mode_power_watts
        min: 0
        max: 3600
        step: 1
        unit_of_measurement: "W"
        state: >-
          {% set max_power = 3600 %}
          {% set percent = states('number.goodwe_eco_mode_power')|float(0) %}
          {{ (percent * max_power / 100) | round(0) }}
        set_value:
          service: number.set_value
          target:
            entity_id: number.goodwe_eco_mode_power
          data:
            value: >-
              {% set max_power = 3600 %}
              {% set pct = (value | float / max_power * 100) %}
              {{ [ [pct, 0] | max, 100 ] | min | round(0) }}

  - sensor:
      # Template sensor for values of energy imported (active_power < 0)
      - name: "Custom Goodwe Energy Import"
        unique_id: custom_goodwe_energy_import
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {% if states('sensor.on_grid_export_power')|float < 0 %}
            {{ states('sensor.on_grid_export_power')|float * -1 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        availability: "{{ states('sensor.on_grid_export_power') not in ['unknown', 'unavailable'] }}"

      # Template sensor for values of energy exported (active_power > 0)
      - name: "Custom Goodwe Energy Export"
        unique_id: custom_goodwe_energy_export
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {% if states('sensor.on_grid_export_power')|float > 0 %}
            {{ states('sensor.on_grid_export_power')|float }}
          {% else %}
            {{ 0 }}
          {% endif %}
        availability: "{{ states('sensor.on_grid_export_power') not in ['unknown', 'unavailable'] }}"

      # Template sensor for values of battery charge (active_power < 0)
      - name: "Custom Goodwe Energy Battery Charge"
        unique_id: custom_goodwe_energy_battery_charge
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {% if states('sensor.battery_power')|float < 0 %}
            {{ states('sensor.battery_power')|float * -1 }}
          {% else %}
            {{ 0 }}
          {% endif %}
        availability: "{{ states('sensor.battery_power') not in ['unknown', 'unavailable'] }}"

      # Template sensor for values of battery discharge (active_power > 0)
      - name: "Custom Goodwe Energy Battery Discharge"
        unique_id: custom_goodwe_energy_battery_discharge
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {% if states('sensor.battery_power')|float > 0 %}
            {{ states('sensor.battery_power')|float }}
          {% else %}
            {{ 0 }}
          {% endif %}
        availability: "{{ states('sensor.battery_power') not in ['unknown', 'unavailable'] }}"

      # Template sensor for house consumption (PV + Import + Battery Discharge - Export - Battery Charge)
      - name: "Custom Goodwe House Consumption"
        unique_id: custom_goodwe_house_consumption
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        state: >-
          {{
            (states('sensor.pv_power')|float(0))
            + (states('sensor.custom_goodwe_energy_import')|float(0))
            + (states('sensor.custom_goodwe_energy_battery_discharge')|float(0))
            - (states('sensor.custom_goodwe_energy_export')|float(0))
            - (states('sensor.custom_goodwe_energy_battery_charge')|float(0))
          }}
        availability: >-
          {{ states('sensor.pv_power') not in ['unknown', 'unavailable']
             and states('sensor.custom_goodwe_energy_import') not in ['unknown', 'unavailable']
             and states('sensor.custom_goodwe_energy_battery_discharge') not in ['unknown', 'unavailable']
             and states('sensor.custom_goodwe_energy_export') not in ['unknown', 'unavailable']
             and states('sensor.custom_goodwe_energy_battery_charge') not in ['unknown', 'unavailable']
          }}

sensor:
  # Riemann sum integration sensors (W -> kWh)
  - platform: integration
    source: sensor.custom_goodwe_energy_import
    name: "Custom Goodwe Energy Import Sum"
    unique_id: custom_goodwe_energy_import_sum
    unit_prefix: k
    round: 2
    method: left

  - platform: integration
    source: sensor.custom_goodwe_energy_export
    name: "Custom Goodwe Energy Export Sum"
    unique_id: custom_goodwe_energy_export_sum
    unit_prefix: k
    round: 2
    method: left

  - platform: integration
    source: sensor.custom_goodwe_energy_battery_charge
    name: "Custom Goodwe Energy Battery Charge Sum"
    unique_id: custom_goodwe_energy_battery_charge_sum
    unit_prefix: k
    round: 2
    method: left

  - platform: integration
    source: sensor.custom_goodwe_energy_battery_discharge
    name: "Custom Goodwe Energy Battery Discharge Sum"
    unique_id: custom_goodwe_energy_battery_discharge_sum
    unit_prefix: k
    round: 2
    method: left

  - platform: integration
    source: sensor.pv_power
    name: "Custom Goodwe PV Power Sum"
    unique_id: custom_goodwe_pv_power_sum
    unit_prefix: k
    round: 2
    method: left

  - platform: integration
    source: sensor.custom_goodwe_house_consumption
    name: "Custom Goodwe House Consumption Sum"
    unique_id: custom_goodwe_house_consumption_sum
    unit_prefix: k
    round: 2
    method: left

utility_meter:
  custom_goodwe_energy_import_daily:
    source: sensor.custom_goodwe_energy_import_sum
    cycle: daily
  custom_goodwe_energy_import_monthly:
    source: sensor.custom_goodwe_energy_import_sum
    cycle: monthly

  custom_goodwe_energy_export_daily:
    source: sensor.custom_goodwe_energy_export_sum
    cycle: daily
  custom_goodwe_energy_export_monthly:
    source: sensor.custom_goodwe_energy_export_sum
    cycle: monthly

  custom_goodwe_house_consumption_daily:
    source: sensor.custom_goodwe_house_consumption_sum
    cycle: daily
  custom_goodwe_house_consumption_monthly:
    source: sensor.custom_goodwe_house_consumption_sum
    cycle: monthly

  custom_goodwe_energy_battery_charge_daily:
    source: sensor.custom_goodwe_energy_battery_charge_sum
    cycle: daily
  custom_goodwe_energy_battery_charge_monthly:
    source: sensor.custom_goodwe_energy_battery_charge_sum
    cycle: monthly

  custom_goodwe_energy_battery_discharge_daily:
    source: sensor.custom_goodwe_energy_battery_discharge_sum
    cycle: daily
  custom_goodwe_energy_battery_discharge_monthly:
    source: sensor.custom_goodwe_energy_battery_discharge_sum
    cycle: monthly

  custom_goodwe_pv_energy_daily:
    source: sensor.custom_goodwe_pv_power_sum
    cycle: daily
  custom_goodwe_pv_energy_monthly:
    source: sensor.custom_goodwe_pv_power_sum
    cycle: monthly
