# ------------------------------------------------------------------
# Setup:
#   Inverter: GoodWe 5048D-ES
#   Batteries: 2x Pylontech US3000C (7kWh capacity)
#   Integration: https://github.com/mletenay/home-assistant-goodwe-inverter
#
# Energy provider:
#   Country: PT
#   Data source: https://github.com/joaofernandes/portuguese_energy_price_tracker_ha_integration
#
# Notes:
#   Only monitor mode is supported at the moment.
#
#   There are many hard coded values in this configuration file.
#   The most important ones are highlighted below, but you should review the entire file and adjust as needed for your setup.
#
#  - Battery capacity (soc_max)
#  - Inverter limit (inverter_limit)
# ------------------------------------------------------------------
---
pred_bat:
  module: predbat
  class: PredBat

  ##
  # Basics
  ##

  # Sets the prefix for all created entities in HA - only change if you want to run more than once instance
  prefix: predbat

  # Timezone to work in
  timezone: Europe/Lisbon

  # Currency, symbol for main currency and second symbol for 1/100s e.g. $ c, £ p or € c
  currency_symbols:
    - "€"
    - "c"

  # If you are using Predbat outside of HA then set the HA URL and Key (long lived access token here)
  ha_url: !secret ha_url
  ha_key: !secret ha_key

  # Take the average of the same day for the last 2 weeks for future load forecasting
  days_previous:
    - 7
    - 14

  # Number of hours forward to forecast, best left as-is unless you have specific reason
  forecast_hours: 48

  ##
  # Inverter information
  ##

  # If you increase this above 1 you must provide multiple of each of the inverter entities
  num_inverters: 1

  # Custom inverter type
  inverter_type: GOODWE_5048D_ES

  ##
  # Historical data
  ##

  # Energy today (not power) sensors, more than one can be specified and they will be summed up automatically
  #
  # For two inverters the load today would normally be the master load sensor only (to cover the entire house)
  # If you have three phase and one inverter per phase then you would need three load sensors
  #
  # For pv_today if you have multiple solar inverter inputs then you should include one entry for each inverter

  # Entity name for the house load in kWh today (must be incrementing)
  load_today:
    - sensor.custom_goodwe_house_consumption_sum

  # Imported energy today in kWh (incrementing)
  import_today:
    - sensor.custom_goodwe_energy_import_sum

  # Exported energy today in kWh (incrementing)
  export_today:
    - sensor.custom_goodwe_energy_export_sum

  # PV energy today in kWh (incrementing)
  pv_today:
    - sensor.custom_goodwe_pv_power_sum

  ##
  # Load filtering
  ##

  # Sets the maximum period of zero load before the gap is filled, default 30 minutes
  # To disable set it to 1440
  load_filter_threshold: 30

  ##
  # Inverter control configurations
  ##

  # Inverter max AC limit (one per inverter). E.g for a 3.6kw inverter set to 3600
  # Set this to your actual inverter limit
  inverter_limit:
    - 5000

  # My house's current maximum simultaneous grid import allowed is 6900W, so to avoid hitting
  # this limit when both the EV and the house battery are charging from the grid, we limit
  # charging to a maximum of 2000W from the grid.
  # 3700W for EV charging
  # 2000W for battery charging
  # 1200W for house consumption
  #
  # IMPORTANT: If this value is removed/changed, review the `battery_rate_max` value as well
  # to ensure the battery charge rate is planned correctly.
  inverter_limit_charge:
    - 2000

  ##
  # Controlling the Inverter: Charge/Discharge rate
  ##

  # Battery SoC target in percentage
  charge_limit:
    - number.goodwe_eco_mode_soc

  # Battery charge rate entity in percentage
  charge_rate_percent:
    - number.goodwe_eco_mode_power

  ##
  # Controlling the Inverter: Battery Information
  ##

  # Maximum battery charge/discharge rate in watts
  battery_rate_max:
    #- 3600 # Pylontech US3000C battery (max sustained 1.8kW per battery)
    #
    # With 3600W as the `battery_rate_max` and 2000W as the `inverter_limit_charge`,
    # predbat will plan to charge the battery at 55.56% (2000/3600) instead of
    # 40% (2000/5000), resulting in a charge rate higher than 2000W.
    #
    # https://github.com/springfall2008/batpred/issues/3558
    - 5000

  # Maximum charge level for the battery in kWh
  soc_max:
    - 7.0 # Pylontech US3000C battery (3.5kWh capacity per battery)

  # Limits the target SoC% setting for charge and discharge
  battery_min_soc:
    - 20

  # The reserve SoC is the lower limit target % to discharge the battery down to.
  reserve:
    - number.custom_goodwe_reserve_soc

  # Temperature of the battery in degrees C
  battery_temperature:
    - sensor.battery_temperature

  ##
  # Controlling the Inverter: Power Data
  ##

  # Current battery power in W or kW
  battery_power:
    - sensor.battery_power

  # Current PV power in W or kW
  pv_power:
    - sensor.pv_power

  # Current load power sensor in W (used with load_power_fill_enable to improve load_today data accuracy)
  load_power:
    - sensor.custom_goodwe_house_consumption

  # Uses load_power data to fill gaps and smooth load_today sensor data
  load_power_fill_enable: True

  # Current grid power in W or kW
  grid_power:
    - sensor.on_grid_export_power

  ##
  # Controlling the Inverter: Battery SoC
  ##

  # Battery SoC
  soc_percent:
    - sensor.battery_state_of_charge

  ##
  # Solcast Solar Forecast
  ##

  pv_forecast_today: re:(sensor.(solcast_|)(pv_forecast_|)forecast_today)
  pv_forecast_tomorrow: re:(sensor.(solcast_|)(pv_forecast_|)forecast_tomorrow)

  ##
  # Energy Rates
  ##

  # By default Predbat will plan and execute its plan based upon 30 minute time intervals
  plan_interval_minutes: 15

  # Daily standing charge in euros, can be set to a sensor or manually entered (e.g. 0.50 is 50c)
  metric_standing_charge: 0.5210

  # Electricity price in euros per kWh for each time interval
  metric_octopus_import: "sensor.custom_predbat_current_buy_electricity_price_raw"

  # Flat export rate
  rates_export:
    - rate: 0

  ##
  # Car Charging Integration
  ##

  # car_charging_energy defines an incrementing sensor which measures the charge added to your car
  # is used for car_charging_hold feature to filter out car charging from the previous load data
  # Automatically set to detect Wallbox and Zappi, if it doesn't match manually enter your sensor name
  # Also adjust car_charging_energy_scale if it's not in kwH to fix the units
  #car_charging_energy: "re:(sensor.myenergi_zappi_[0-9a-z]+_charge_added_session|sensor.wallbox_portal_added_energy)"

  # Defines the number of cars modelled by the system, set to 0 for no car
  num_cars: 0

  # car_charging_planned is set to a sensor which when positive indicates the car will charged in the upcoming low rate slots
  # This should not be needed if you use Intelligent Octopus slots which will take priority if enabled
  # The list of possible values is in car_charging_planned_response
  # Auto matches Zappi and Wallbox, or change it for your own
  # One entry per car
  #car_charging_planned:
  #- "re:(sensor.wallbox_portal_status_description|sensor.myenergi_zappi_[0-9a-z]+_plug_status)"

  #car_charging_planned_response:
  #- "yes"
  #- "on"
  #- "true"
  #- "connected"
  #- "ev connected"
  #- "charging"
  #- "paused"
  #- "waiting for car demand"
  #- "waiting for ev"
  #- "scheduled"
  #- "enabled"
  #- "latched"
  #- "locked"
  #- "plugged in"
  #- "waiting"

  # In some cases car planning is difficult (e.g. Ohme with Intelligent doesn't report slots)
  # The car charging now can be set to a sensor to indicate the car is charging and to plan
  # for it to charge during this 30 minute slot
  #car_charging_now:
  #  - off

  # Positive responses for car_charging_now
  #car_charging_now_response:
  #- "yes"
  #- "on"
  #- "true"

  # To make planned car charging more accurate, either using car_charging_planned or the Octopus Energy plugin,
  # specify your battery size in kwh, charge limit % and current car battery soc % sensors/values.
  # If you have Intelligent Octopus the battery size and limit will be extracted from the Octopus Energy plugin directly.
  # Set the car SoC% if you have it to give an accurate forecast of the cars battery levels.
  # One entry per car if you have multiple cars.
  #car_charging_battery_size:
  #  - 75
  #car_charging_limit:
  #  - 're:number.tsunami_charge_limit'
  #car_charging_soc:
  #  - 're:sensor.tsunami_battery'

  # One per car, when true only one car can charge at once, when False multiple cars can charge at once
  #car_charging_exclusive:
  #  - True

  ##
  # Battery charge/discharge curves
  ##

  # Provides a fallback charging curve when Predbat cannot auto-detect the curve from your inverter
  battery_charge_power_curve_default:
    89: 0.74
    90: 0.74
    91: 0.74
    92: 0.74
    93: 0.42
    94: 0.42
    95: 0.42
    96: 0.42
    97: 0.43
    98: 0.43
    99: 0.43
    100: 0.43

  ##
  # Temperature
  ##

  # Enable temperature forecasts (recommended for ML load prediction)
  temperature_enable: true

  ##
  # Machine Learning (ML) load prediction
  ##

  # Enable ML load prediction
  load_ml_enable: True

  # Use the output data in Predbat (can be False to explore the use without using the data)
  load_ml_source: True

  ##
  # Inverter
  ##

  inverter:
    name: "GOODWE_5048D_ES"
    has_rest_api: False
    has_mqtt_api: False
    has_service_api: True
    output_charge_control: "power"
    charge_control_immediate: False
    current_dp: 1
    charge_discharge_with_rate: False
    has_charge_enable_time: False
    has_discharge_enable_time: False
    has_target_soc: True
    target_soc_used_for_discharge: False
    has_reserve_soc: True
    has_timed_pause: False
    time_button_press: False
    support_charge_freeze: False
    support_discharge_freeze: False
    has_ge_inverter_mode: False
    has_fox_inverter_mode: False
    has_idle_time: False
    has_time_window: False
    charge_time_format: "S"
    charge_time_entity_is_option: False
    can_span_midnight: False
    clock_time_format: "%Y-%m-%d %H:%M:%S"
    num_load_entities: 1
    soc_units: "%"
    write_and_poll_sleep: 5

  charge_start_service:
    - service: select.select_option
      entity_id: "select.goodwe_inverter_operation_mode"
      option: eco_charge

  charge_stop_service:
    - service: select.select_option
      entity_id: "select.goodwe_inverter_operation_mode"
      option: general

  # This is a no-op definition.
  #
  # Before adjusting the charge settings (adjust_charge_immediate method), Predbat will call
  # this service to stop discharging, and then call the charge_start_service to start charging
  # with the new settings.
  #
  # Without this no-op service, Predbat will call the charge_stop_service before calling the
  # charge_start_service which would unnecessary cause the inverter mode to change twice.
  discharge_stop_service: []
