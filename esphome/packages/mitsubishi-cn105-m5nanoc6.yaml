# Mitsubishi CN105 Climate Control on M5Stack NanoC6 ESP32-C6
#
# Hardware:
#
# Description: M5Stack M5NanoC6
# Product Number: 110990031
# https://mauser.pt/095-4088/m5stack-m5nanoc6-kit-de-desenvolvimento-nano-iot-com-esp32-c6-wi-fi-6-zigbee-thread-e-matter
#
# Description: CONN RCPT HSG 5POS 2.00MM
# Product Number: PAP-05V-S
# https://mauser.pt/011-3514/ficha-raster-signal-wire-board-2-0mm-5-pinos-femea-jst-pap-05v-s
#
# Description: SEEED GROVE 4PIN CABLES 5PACK 20CM
# Product Number: 096-6569
# https://mauser.pt/096-6569/seeed-conjunto-de-5-cabos-grove-4-pinos-20cm
#
# Mitsubishi Models (tested):
# - MSZ-EF25VE3S
# - MSZ-EF50VE3S

external_components:
  - source: github://echavet/MitsubishiCN105ESPHome

esphome:
  name: ${name} # Do not use underscores, which are not fully compatible with mDNS
  friendly_name: ${friendly_name}
  on_boot:
    priority: 200
    then:
      - delay: 30s
      - light.turn_off:
          id: rgb_led

esp32:
  board: esp32-c6-devkitc-1
  flash_size: 4MB
  framework:
    type: esp-idf

uart:
  id: HP_UART
  baud_rate: 2400
  tx_pin: GPIO1
  rx_pin: GPIO2

# Enable logging
logger:
  level: INFO
  logs:
    CN105Climate: WARN
    climate: WARN
    sensor: WARN
    WRITE: WARN
    READ: WARN

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

# Enable Over-the-Air updates
ota:
  - platform: esphome
    password: !secret ota_password

openthread:
  tlv: !secret thread_tlv

#wifi:
#ssid: !secret wifi_ssid
#password: !secret wifi_password

network:
  enable_ipv6: true

##
# Climate entity configuration
##

climate:
  - platform: cn105
    id: hp
    name: ${friendly_name}
    icon: mdi:heat-pump
    visual:
      min_temperature: 16
      max_temperature: 31
      temperature_step:
        target_temperature: 1.0
        current_temperature: 0.5

    ##
    # Timeout and communication settings
    ##

    # Allows the unit to revert back to the internal temperature measurement if it does not
    # receive an update in the specified time range (highly recommended if using remote temperature updates).
    remote_temperature_timeout: 30min

    update_interval: 4s # shouldn't be less than 1 second
    debounce_delay: 100ms # delay to prevent bouncing

    ##
    # Sensors
    ##

    compressor_frequency_sensor:
      name: ${name} Compressor Frequency
      entity_category: diagnostic
      disabled_by_default: false

    vertical_vane_select:
      name: ${name} Vertical Vane
      disabled_by_default: false # TODO: confirm this works

    stage_sensor:
      name: Stage or Fan state
      entity_category: diagnostic
      disabled_by_default: false

    sub_mode_sensor:
      name: Sub Mode
      entity_category: diagnostic
      disabled_by_default: false

    auto_sub_mode_sensor:
      name: Auto Mode
      entity_category: diagnostic
      disabled_by_default: false

    # Added manually:
    input_power_sensor:
      name: Input Power
      disabled_by_default: true # TODO: confirm this works

    # Added manually:
    kwh_sensor:
      name: Energy Usage
      disabled_by_default: true # TODO: confirm this works

# below taken from https://github.com/bogorad/m5stack-m5NanoC6-esphome/blob/main/packages/generic_m5stack-nano-c6.yaml combined with https://github.com/yoziru/esphome-m5-btproxy/tree/main

### IR transmitter stopped working 2025/02
# remote_transmitter:
#   pin: GPIO3
#   # Infrared remotes use a 50% carrier signal
#   carrier_duty_percent: 50%
#   # rmt_channel: 1

# Configuration of M5Stack NanoC6 onboard button
binary_sensor:
  - platform: status
    name: Online
    id: ink_ha_connected

  - platform: gpio
    name: Button
    entity_category: diagnostic
    pin:
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_off: 10ms
    on_press:
      then:
        - logger.log: Button Pressed

button:
  # Create a button to restart the unit from HomeAssistant. Rarely needed, but can be handy.
  - platform: restart
    icon: mdi:power-cycle
    name: "Restart ${friendly_name}"

# This LED is enclosed within the AC unit so it's normally not visible,
# but it can be enabled and used for debugging if needed.
#
# Additionally, the light is turned on during boot and then turned off
# after a 30s delay, to provide a visual indication of the boot process.
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO20
    num_leds: 1
    # rmt_channel: 0 ### this stopped working 2025/02
    chipset: WS2812
    is_rgbw: true
    restore_mode: ALWAYS_ON # light is on during boot. Will be turned off after 30s delay
    disabled_by_default: true
    id: rgb_led
    name: "Light"
    icon: "mdi:led-outline"
    power_supply: rgbpwr
    effects:
      - random:
      - flicker:
      - addressable_rainbow:

power_supply:
  - id: "rgbpwr"
    enable_on_boot: true
    pin: GPIO19
    enable_time: 10ms
    keep_on_time: 10ms

text_sensor:
  #- platform: wifi_info
  #ip_address:
  #name: "My IP Address"
  #id: wifi_ip_address
  #mac_address:
  #name: "My Mac Wifi Address"
  #id: wifi_mac_address
  #ssid:
  #name: "Connected SSID"
  #id: wifi_connected_ssid
  #bssid:
  #name: "Connected BSSID"
  #id: wifi_connected_bssid
  #dns_address:
  #name: "DNS Address"
  #id: wifi_dns_address
  - platform: openthread_info
    ip_address:
      name: "Off-mesh routable IP Address"
    channel:
      name: "Channel"
    role:
      name: "Device Role"
    rloc16:
      name: "RLOC16"
    ext_addr:
      name: "Extended Address"
    eui64:
      name: "EUI64"
    network_name:
      name: "Network Name"
    # network_key:
    #   name: "Network Key"
    pan_id:
      name: "PAN ID"
    ext_pan_id:
      name: "Extended PAN ID"
  - platform: version
    name: Version
    hide_timestamp: true
    disabled_by_default: false
    icon: mdi:new-box
    entity_category: diagnostic

sensor:
  # Uptime sensor
  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s

  # WiFi Signal sensor
  #- platform: wifi_signal
  #name: "WiFi Signal"
  #update_interval: 60s

  # Internal temperature sensor
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature

switch:
  # This LED is enclosed within the AC unit so it's normally not visible,
  # but it can be enabled and used for debugging if needed.
  - platform: gpio
    pin: GPIO7
    disabled_by_default: true
    name: "on board LED"

# Sync time with Home Assistant.
time:
  - platform: homeassistant
    id: homeassistant_time
